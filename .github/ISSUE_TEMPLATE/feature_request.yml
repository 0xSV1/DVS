name: Feature Request
description: Suggest a new challenge, vulnerability module, or platform feature.
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New challenge
        - New vulnerability module
        - Platform feature
        - Documentation improvement
        - LLM integration
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why is this useful? What OWASP category or learning objective does it address?
  - type: textarea
    id: implementation
    attributes:
      label: Implementation notes
      description: Any thoughts on how this could be implemented? Which difficulty tiers would it span?
