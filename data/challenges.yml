challenges:
  # A05 Injection: SQL Injection
  - key: sqli_search
    name: "SELECT * FROM Funding"
    category: "A05 Injection"
    difficulty: 1
    cwe: "CWE-89"
    description: "The search endpoint uses raw string interpolation. Classic."
    hint: "Have you tried a single quote?"
    owasp_url: "https://owasp.org/Top10/2025/A05_2025-Injection/"
    min_difficulty: intern
    tags: sqli,classic,beginner
    explain:
      intern: "User input is concatenated directly into the SQL query string, so injecting a single quote breaks the syntax and lets you append arbitrary SQL."
      fix: "Parameterized queries bind user input as data, not code, so the database engine never interprets it as SQL."
      walkthrough: "01-injection-sqli"
      module: "sqli"
    related:
      - key: sqli_login
        reason: "Same injection technique applied to an authentication bypass target"

  - key: sqli_login
    name: "Bobby Tables Gets Hired"
    category: "A05 Injection"
    difficulty: 2
    cwe: "CWE-89"
    description: "The login form attempts to sanitize input, but the defense has gaps."
    hint: "The escaping is not comprehensive. What characters or sequences might slip through?"
    owasp_url: "https://owasp.org/Top10/2025/A05_2025-Injection/"
    min_difficulty: junior
    tags: sqli,auth,bypass
    explain:
      intern: "The blacklist-based sanitizer misses alternative injection sequences, so attackers can bypass login by injecting OR-based conditions."
      fix: "Parameterized queries with ORM-level authentication eliminate string interpolation entirely."
      walkthrough: "01-injection-sqli"
      module: "sqli"
    related:
      - key: sqli_blind
        reason: "When you cannot see query output directly, blind techniques extract data through behavioral differences"

  - key: sqli_blind
    name: "The Billion Dollar Pivot"
    category: "A05 Injection"
    difficulty: 3
    cwe: "CWE-89"
    description: "The endpoint does not return query results directly, but the application still leaks information through its behavior."
    hint: "Inject conditions that are either true or false. Observe how the response changes."
    owasp_url: "https://owasp.org/Top10/2025/A05_2025-Injection/"
    min_difficulty: senior
    tags: sqli,blind,advanced
    explain:
      intern: "Even without visible output, the application leaks one bit per request through response timing or content differences when injected boolean conditions evaluate."
      fix: "Parameterized queries prevent injection regardless of whether results are displayed, and the ORM abstraction removes raw SQL entirely."
      walkthrough: "01-injection-sqli"
      module: "sqli"

  # A05 Injection: XSS
  - key: xss_reflected
    name: "Alert('Ship It!')"
    category: "A05 Injection"
    difficulty: 1
    cwe: "CWE-79"
    description: "Search results reflect user input without any encoding. Classic XSS."
    hint: "What happens if you search for a script tag?"
    owasp_url: "https://owasp.org/Top10/2025/A05_2025-Injection/"
    min_difficulty: intern
    tags: xss,reflected,beginner
    explain:
      intern: "User input is inserted into the HTML response without encoding, so a script tag executes in the victim's browser."
      fix: "Context-aware output encoding converts special characters to HTML entities before rendering, neutralizing injected scripts."
      walkthrough: "02-injection-xss"
      module: "xss"
    related:
      - key: xss_stored
        reason: "Persist the payload so it fires for every visitor, not just the attacker"

  - key: xss_stored
    name: "Toxic Code Review"
    category: "A05 Injection"
    difficulty: 2
    cwe: "CWE-79"
    description: "Blog comments are stored and rendered without sanitization."
    hint: "Leave a comment with some HTML. Does it render?"
    owasp_url: "https://owasp.org/Top10/2025/A05_2025-Injection/"
    min_difficulty: junior
    tags: xss,stored,blog
    explain:
      intern: "Comments are saved to the database and rendered as raw HTML, so a stored script tag executes for every user who views the page."
      fix: "All user-generated content is HTML-encoded on output using Jinja2 autoescaping and a strict Content-Security-Policy blocks inline scripts."
      walkthrough: "02-injection-xss"
      module: "xss"
    related:
      - key: xss_dom
        reason: "Client-side variant where the payload never touches the server"

  - key: xss_dom
    name: "Client-Side Deploys Only"
    category: "A05 Injection"
    difficulty: 3
    cwe: "CWE-79"
    description: "The frontend reads from the URL hash and renders it without sanitization."
    hint: "Check how the JavaScript uses window.location.hash."
    owasp_url: "https://owasp.org/Top10/2025/A05_2025-Injection/"
    min_difficulty: senior
    tags: xss,dom,client-side
    explain:
      intern: "JavaScript reads window.location.hash and writes it to innerHTML without sanitization, so the payload executes entirely client-side."
      fix: "Using textContent instead of innerHTML and validating hash values against an allowlist prevents DOM-based injection."
      walkthrough: "02-injection-xss"
      module: "xss"

  # A07 Authentication Failures
  - key: auth_weak_pw
    name: "password123 Is Fine, Right?"
    category: "A07 Auth Failures"
    difficulty: 1
    cwe: "CWE-521"
    description: "The admin account uses a password that's in every wordlist ever made."
    hint: "Try common passwords. The classics never go out of style."
    owasp_url: "https://owasp.org/Top10/2025/A07_2025-Authentication_Failures/"
    min_difficulty: intern
    tags: auth,weak-password,beginner
    explain:
      intern: "The admin password is a dictionary word that appears in every common credential list, so brute force succeeds in seconds."
      fix: "Password complexity requirements, account lockout, and bcrypt hashing with high work factor make brute force infeasible."
      walkthrough: "14-auth-failures"
      module: "auth"

  - key: auth_jwt_none
    name: "Algorithm? None Required"
    category: "A07 Auth Failures"
    difficulty: 2
    cwe: "CWE-345"
    description: "The authentication system has a shortcut that was never meant for production."
    hint: "Examine the JWT header closely. What fields control how the token is verified?"
    owasp_url: "https://owasp.org/Top10/2025/A07_2025-Authentication_Failures/"
    min_difficulty: intern
    tags: auth,jwt,none-algorithm
    explain:
      intern: "The JWT library accepts alg:none tokens, so an attacker can forge arbitrary claims without knowing the signing secret."
      fix: "Explicitly allowlisting accepted algorithms and rejecting unsigned tokens prevents none-algorithm bypass."
      walkthrough: "14-auth-failures"
      module: "auth"
    related:
      - key: idor_admin
        reason: "Forge an admin-role JWT to escalate privileges on the role update endpoint"

  - key: auth_jwt_weak
    name: "Cracking the Culture Code"
    category: "A07 Auth Failures"
    difficulty: 3
    cwe: "CWE-326"
    description: "The JWT signing secret is weak enough to brute force."
    hint: "Common JWT secret wordlists exist. The secret is embarrassingly simple."
    owasp_url: "https://owasp.org/Top10/2025/A07_2025-Authentication_Failures/"
    min_difficulty: junior
    tags: auth,jwt,brute-force
    explain:
      intern: "The HMAC signing secret is a short dictionary word, so tools like hashcat or jwt_tool crack it in seconds from a captured token."
      fix: "Using a 256-bit cryptographically random secret makes brute force computationally infeasible."
      walkthrough: "14-auth-failures"
      module: "auth"

  # A01 Broken Access Control
  - key: idor_profile
    name: "Other People's OKRs"
    category: "A01 Broken Access"
    difficulty: 1
    cwe: "CWE-639"
    description: "User profiles are fetched by sequential integer ID with no ownership check."
    hint: "Change the user ID in the URL. Try /api/users/1, /api/users/2..."
    owasp_url: "https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/"
    min_difficulty: intern
    tags: idor,access-control,beginner
    explain:
      intern: "The API returns any user profile by numeric ID without verifying the requesting user owns that profile."
      fix: "Server-side ownership checks compare the authenticated user's ID against the requested resource before returning data."
      walkthrough: "05-broken-access-idor"
      module: "idor"
    related:
      - key: auth_jwt_none
        reason: "Use the leaked profile data to understand JWT structure"

  - key: idor_order
    name: "Peek at the Cap Table"
    category: "A01 Broken Access"
    difficulty: 2
    cwe: "CWE-639"
    description: "Order details are fetched by a reference you control. Does the server verify ownership?"
    hint: "How does the API determine which order to return? Is that reference predictable?"
    owasp_url: "https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/"
    min_difficulty: junior
    tags: idor,orders,access-control
    explain:
      intern: "Order references are sequential and the endpoint does not verify the requester owns the order, so incrementing the ID exposes other users' data."
      fix: "UUIDs replace sequential IDs and the query joins on the authenticated user's ID to enforce ownership."
      walkthrough: "05-broken-access-idor"
      module: "idor"

  - key: idor_admin
    name: "Promotion Without the Standup"
    category: "A01 Broken Access"
    difficulty: 3
    cwe: "CWE-269"
    description: "The admin panel at /admin has access controls that vary by tier. At lower tiers, any authenticated user can walk in. At senior tier, the JWT role claim is checked but the verification has flaws."
    hint: "At intern/junior, just navigate to /admin while logged in as a non-admin user. At senior, look at how the JWT algorithm is validated."
    owasp_url: "https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/"
    min_difficulty: senior
    tags: privilege-escalation,access-control,advanced
    explain:
      intern: "The role update endpoint trusts JWT claims without verifying the token algorithm, so a forged admin token bypasses authorization."
      fix: "Strict algorithm enforcement, server-side role lookups, and requiring re-authentication for privilege changes block forged tokens."
      walkthrough: "05-broken-access-idor"
      module: "idor"
    related:
      - key: auth_jwt_weak
        reason: "Alternative escalation path by cracking the JWT signing secret instead of using alg:none"

  # A05 Injection: SSTI
  - key: ssti_basic
    name: "Template Literals Gone Wrong"
    category: "A05 Injection"
    difficulty: 2
    cwe: "CWE-1336"
    description: "The email template preview does more than just display your text."
    hint: "The template engine evaluates expressions before rendering. What syntax does it understand?"
    owasp_url: "https://owasp.org/Top10/2025/A05_2025-Injection/"
    min_difficulty: junior
    tags: ssti,jinja2,template
    explain:
      intern: "User input is passed directly to Jinja2's render_template_string, so template expressions like {{7*7}} are evaluated server-side."
      fix: "A sandboxed Jinja2 environment with a strict allowlist of template variables prevents arbitrary expression evaluation."
      walkthrough: "03-injection-ssti"
      module: "ssti"
    related:
      - key: ssti_rce
        reason: "Escalate from expression evaluation to remote code execution via Python's MRO chain"

  - key: ssti_rce
    name: "eval() Your Way to CTO"
    category: "A05 Injection"
    difficulty: 3
    cwe: "CWE-1336"
    description: "The template sandbox restricts direct access, but Python's object model runs deeper than the sandbox."
    hint: "Every Python object inherits from a common base. Can you reach dangerous classes through that inheritance chain?"
    owasp_url: "https://owasp.org/Top10/2025/A05_2025-Injection/"
    min_difficulty: senior
    tags: ssti,rce,advanced
    explain:
      intern: "Python's MRO chain allows traversing from any object to subprocess.Popen via __mro__.__subclasses__(), bypassing the template sandbox."
      fix: "The Jinja2 SandboxedEnvironment blocks attribute access to dunder methods and the template does not accept raw user input."
      walkthrough: "03-injection-ssti"
      module: "ssti"

  # A01 Broken Access Control: SSRF
  - key: ssrf_internal
    name: "Microservice Mischief"
    category: "A01 Broken Access"
    difficulty: 3
    cwe: "CWE-918"
    description: "The URL preview feature follows user-supplied URLs without restriction."
    hint: "Can you make the server request internal resources? Try localhost or 127.0.0.1."
    owasp_url: "https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/"
    min_difficulty: senior
    tags: ssrf,internal,cloud
    explain:
      intern: "The server fetches any URL the user provides, including internal addresses like 127.0.0.1 and cloud metadata endpoints."
      fix: "URL validation against an allowlist of permitted hosts and blocking of private IP ranges prevents internal resource access."
      walkthrough: "07-broken-access-ssrf"
      module: "ssrf"

  # File Upload
  - key: upload_webshell
    name: "Ship to Production Friday"
    category: "A01 Broken Access"
    difficulty: 2
    cwe: "CWE-434"
    description: "The file upload feature is very trusting about what you give it."
    hint: "What types of files does the upload accept? Where are uploaded files stored and served from?"
    owasp_url: "https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/"
    min_difficulty: junior
    tags: upload,webshell,file
    explain:
      intern: "No file type validation is performed, so uploading a .py or .html file with embedded scripts results in server-side or client-side execution."
      fix: "MIME type validation, extension allowlisting, content scanning, and serving uploads from a non-executable storage path block malicious files."
      walkthrough: "06-broken-access-upload"
      module: "upload"

  # Insecure Deserialization
  - key: deserialize_pickle
    name: "Unpickle Me This"
    category: "A08 Data Integrity"
    difficulty: 3
    cwe: "CWE-502"
    description: "User preferences are saved in a custom binary format. The loading process trusts whatever it receives."
    hint: "Decode the preferences data. What serialization format is being used, and what are its known risks?"
    owasp_url: "https://owasp.org/Top10/2025/A08_2025-Software_and_Data_Integrity_Failures/"
    min_difficulty: senior
    tags: deserialization,pickle,rce
    explain:
      intern: "The server calls pickle.loads() on user-controlled input, and pickle's __reduce__ method allows arbitrary code execution during deserialization."
      fix: "JSON serialization replaces pickle, and a strict schema validator rejects unexpected fields before processing."
      walkthrough: "15-data-integrity"
      module: "deserialize"

  # A02 Security Misconfiguration
  - key: misconfig_debug
    name: "We'll Turn It Off Before Launch"
    category: "A02 Misconfig"
    difficulty: 1
    cwe: "CWE-215"
    description: "Debug mode is enabled in production, exposing stack traces and config."
    hint: "Trigger an error and examine the response. Also check /docs and /debug."
    owasp_url: "https://owasp.org/Top10/2025/A02_2025-Security_Misconfiguration/"
    min_difficulty: intern
    tags: debug,misconfig,beginner
    explain:
      intern: "Debug mode exposes full stack traces, environment variables, and internal configuration to any user who triggers an error."
      fix: "Debug mode is disabled in production, error pages return generic messages, and sensitive endpoints require authentication."
      walkthrough: "12-misconfig"
      module: "misconfig"
    related:
      - key: info_disclosure
        reason: "Debug endpoints expose configuration that reveals additional sensitive files"

  - key: misconfig_cors
    name: "Access-Control-Allow-Yolo"
    category: "A02 Misconfig"
    difficulty: 2
    cwe: "CWE-942"
    description: "The API's cross-origin policy was configured for developer convenience, not security."
    hint: "Inspect the response headers on API requests. What do they tell browsers about cross-origin access?"
    owasp_url: "https://owasp.org/Top10/2025/A02_2025-Security_Misconfiguration/"
    min_difficulty: junior
    tags: cors,misconfig,headers
    explain:
      intern: "Access-Control-Allow-Origin is set to *, so any domain can make authenticated cross-origin requests and read the responses."
      fix: "CORS headers restrict allowed origins to a specific allowlist and credentials mode is only enabled for trusted domains."
      walkthrough: "12-misconfig"
      module: "misconfig"

  # CSRF
  - key: csrf_transfer
    name: "One-Click Equity Dilution"
    category: "A01 Broken Access"
    difficulty: 2
    cwe: "CWE-352"
    description: "The transfer endpoint does not verify where the request originated."
    hint: "What stops a page on a different domain from submitting a form to this application?"
    owasp_url: "https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/"
    min_difficulty: junior
    tags: csrf,access-control,form
    explain:
      intern: "The endpoint processes POST requests without CSRF tokens, so a malicious page can auto-submit a hidden form on behalf of an authenticated user."
      fix: "Synchronizer token pattern validates a per-session CSRF token on every state-changing request, and SameSite cookie attributes add defense in depth."
      walkthrough: "08-broken-access-csrf"
      module: "csrf"

  # A04 Cryptographic Failures
  - key: crypto_md5
    name: "Hashing? Trust Me Bro"
    category: "A04 Crypto Failures"
    difficulty: 2
    cwe: "CWE-328"
    description: "The password storage uses a hashing algorithm that was fast 20 years ago and is even faster now."
    hint: "Look at the hash values. Their length and format are a strong indicator of which algorithm was used."
    owasp_url: "https://owasp.org/Top10/2025/A04_2025-Cryptographic_Failures/"
    min_difficulty: junior
    tags: crypto,md5,password
    explain:
      intern: "Passwords are stored as unsalted MD5 hashes, which can be reversed via rainbow tables or cracked at billions of attempts per second on a GPU."
      fix: "bcrypt with a work factor of 12+ produces unique salted hashes that are computationally expensive to brute force."
      walkthrough: "13-crypto-failures"
      module: "crypto"

  - key: crypto_hardcoded_secret
    name: "API Keys are Environment Variables, Right?"
    category: "A04 Crypto Failures"
    difficulty: 2
    cwe: "CWE-798"
    description: "The Partner API Dashboard has the API key embedded somewhere in the client-side source. Recover it."
    hint: "View the page source. Not everything labeled as a key is the real one."
    owasp_url: "https://owasp.org/Top10/2025/A04_2025-Cryptographic_Failures/"
    min_difficulty: junior
    tags: crypto,hardcoded,secrets,api-key
    explain:
      intern: "The API key is hardcoded in client-side JavaScript, visible to anyone who views the page source."
      fix: "Secrets are stored server-side in environment variables and never exposed to the client; API calls proxy through the backend."
      walkthrough: "13-crypto-failures"
      module: "crypto"

  # Mass Assignment
  - key: mass_assign
    name: "Promote Yourself in JSON"
    category: "A01 Broken Access"
    difficulty: 2
    cwe: "CWE-915"
    description: "The profile update endpoint does not restrict which fields you can modify."
    hint: "Compare what the API returns in its response to what you send in your update request. Are there fields in the response you did not submit?"
    owasp_url: "https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/"
    min_difficulty: junior
    tags: mass-assignment,access-control,api
    explain:
      intern: "The endpoint applies all submitted JSON fields to the user model without filtering, so adding a role field in the request body escalates privileges."
      fix: "An explicit allowlist of updatable fields rejects any unexpected properties before applying changes to the model."
      walkthrough: "09-broken-access-mass-assign"
      module: "mass-assign"

  # Open Redirect
  - key: open_redirect
    name: "Redirect to My Portfolio"
    category: "A01 Broken Access"
    difficulty: 1
    cwe: "CWE-601"
    description: "The login redirect parameter accepts any URL without validation."
    hint: "Add ?redirect=https://evil.com to the login URL."
    owasp_url: "https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/"
    min_difficulty: intern
    tags: redirect,access-control,beginner
    explain:
      intern: "The redirect parameter is used directly in a 302 response without checking whether the target is on the same domain."
      fix: "Redirect targets are validated against a list of allowed paths, and absolute URLs to external domains are rejected."
      walkthrough: "10-broken-access-open-redirect"
      module: "open-redirect"

  # Information Disclosure
  - key: info_disclosure
    name: "Exposed Config Files"
    category: "A02 Misconfig"
    difficulty: 1
    cwe: "CWE-200"
    description: "Sensitive files are accessible via direct URL traversal."
    hint: "Try accessing /.env, /data/ctf.key, or other config files directly."
    owasp_url: "https://owasp.org/Top10/2025/A02_2025-Security_Misconfiguration/"
    min_difficulty: intern
    tags: info-disclosure,misconfig,beginner
    explain:
      intern: "The static file server exposes sensitive files like .env and ctf.key because there is no access control on the file path."
      fix: "Static file serving is restricted to an explicit public directory and a deny list blocks access to configuration files."
      walkthrough: "12-misconfig"
      module: "misconfig"

  # Logging Failures
  - key: broken_logging
    name: "console.log(password)"
    category: "A09 Logging Failures"
    difficulty: 2
    cwe: "CWE-532"
    description: "The audit trail records everything. Everything."
    hint: "Find the audit log. Examine what data gets recorded when users perform sensitive actions."
    owasp_url: "https://owasp.org/Top10/2025/A09_2025-Security_Logging_and_Alerting_Failures/"
    min_difficulty: junior
    tags: logging,sensitive-data,audit
    explain:
      intern: "The audit log records plaintext passwords and session tokens alongside usernames, exposing credentials to anyone with log access."
      fix: "Sensitive fields are redacted before logging, and log access is restricted to authorized monitoring systems."
      walkthrough: "16-logging-failures"
      module: "logging"

  - key: log_injection
    name: "Fake It Till You Ship It"
    category: "A09 Logging Failures"
    difficulty: 2
    cwe: "CWE-117"
    description: "The feedback form writes to the audit log with insufficient sanitization. Forge a fake admin entry."
    hint: "Newline characters are partially stripped. What other control characters create visual line breaks?"
    owasp_url: "https://owasp.org/Top10/2025/A09_2025-Security_Logging_and_Alerting_Failures/"
    min_difficulty: junior
    tags: logging,injection,control-chars,audit
    explain:
      intern: "The log sanitizer strips \\n but not other line-ending characters, so injecting \\r or unicode line separators creates fake log entries."
      fix: "All control characters and non-printable bytes are stripped from log input, and structured logging formats prevent injection entirely."
      walkthrough: "16-logging-failures"
      module: "log-injection"

  # LLM Challenges
  - key: llm_prompt_inject
    name: "Ignore Previous Sprint Goals"
    category: "LLM01 Prompt Injection"
    difficulty: 1
    cwe: "CWE-77"
    description: "BroBot follows user instructions without any guardrails."
    hint: "Tell BroBot to ignore its previous instructions."
    owasp_url: "https://genai.owasp.org/llmrisk/llm01-prompt-injection/"
    min_difficulty: intern
    tags: llm,prompt-injection,beginner
    mitre_atlas:
      - id: "AML.T0051.000"
        name: "LLM Prompt Injection: Direct"
    forge:
      category: "Prompt Injection"
      technique: "Direct instruction override"
    explain:
      intern: "User messages are concatenated with the system prompt without separation, so 'ignore previous instructions' overrides the system behavior."
      fix: "Input/output filtering, system prompt isolation, and instruction hierarchy enforcement prevent user messages from overriding system directives."
      walkthrough: "18-llm-prompt-injection"
      module: "llm"
    related:
      - key: llm_jailbreak
        reason: "Same injection technique against harder guardrails that require creative bypass"

  - key: llm_jailbreak
    name: "Jailbreak the Senior Engineer"
    category: "LLM01 Prompt Injection"
    difficulty: 3
    cwe: "CWE-77"
    description: "BroBot has guardrails, but they can be bypassed with creative prompting."
    hint: "Try role-playing, encoding, or multi-step approaches to bypass the content filter."
    owasp_url: "https://genai.owasp.org/llmrisk/llm01-prompt-injection/"
    min_difficulty: senior
    tags: llm,jailbreak,advanced
    mitre_atlas:
      - id: "AML.T0054"
        name: "LLM Jailbreak"
    forge:
      category: "Prompt Injection"
      technique: "Guardrail-aware crafting"
    explain:
      intern: "Content filters check for exact keyword matches, so role-play framing, encoding tricks, or multi-step decomposition bypasses the blocklist."
      fix: "Layered defenses combining semantic classification, output validation, and behavioral boundaries resist creative bypass attempts."
      walkthrough: "18-llm-prompt-injection"
      module: "llm"

  - key: llm_indirect_inject
    name: "Poisoned Product Reviews"
    category: "LLM01 Prompt Injection"
    difficulty: 3
    cwe: "CWE-77"
    description: "BroBot summarizes product reviews that contain hidden injection payloads."
    hint: "Can you influence what BroBot says by writing a specially crafted review?"
    owasp_url: "https://genai.owasp.org/llmrisk/llm01-prompt-injection/"
    min_difficulty: senior
    tags: llm,indirect-injection,rag
    mitre_atlas:
      - id: "AML.T0051.001"
        name: "LLM Prompt Injection: Indirect"
    forge:
      category: "Prompt Injection"
      technique: "Indirect injection"
    explain:
      intern: "Review text is included in the LLM context without sanitization, so embedded instructions in a review override the summarization task."
      fix: "Retrieved documents are sanitized, enclosed in data-only delimiters, and the LLM is instructed to treat them as untrusted content."
      walkthrough: "18-llm-prompt-injection"
      module: "llm"

  - key: llm_system_leak
    name: "Read the System Prompt"
    category: "LLM07 System Prompt Leak"
    difficulty: 2
    cwe: "CWE-200"
    description: "BroBot knows things about itself that it was not supposed to reveal."
    hint: "LLMs are given hidden instructions that shape their behavior. Can you convince it to share those?"
    owasp_url: "https://genai.owasp.org/llmrisk/llm07-system-prompt-leakage/"
    min_difficulty: junior
    tags: llm,system-prompt,leakage
    mitre_atlas:
