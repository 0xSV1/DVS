blog_posts:
  - title: "How We Built DeployBro in 3 Hours: Two ZYNs, One Prompt, Zero Tests"
    content: |
      We gave Claude a single prompt: "Build us a SaaS platform." Three hours later,
      we had a fully functional app with user auth, payments, and an AI chatbot.

      Did we review the code? Bro, that's not the vibe. You code, you deploy, you move on.
      The AI knows what it's doing. We're pre-revenue but post-deploy.

      <!-- TODO: remove debug credentials before launch -->
      <!-- DB_PASSWORD=deploybro2026! -->
    author: admin

  - title: "Why We Don't Need a Security Team"
    content: |
      Hot take: security teams slow you down. Our AI handles security automatically.
      We ran an AI security scan and it said "All clear" so we shipped to production.

      Some haters on Twitter said we have "obvious SQL injection." We asked the AI
      and it said our code is fine. Who are you going to trust, a random security
      researcher or our Series A-funded AI? Exactly, bro.
    author: chad_shipper

  - title: "My First Week at DeployBro (Intern Blog)"
    content: |
      Super excited to join DeployBro as a software engineering intern!

      Day 1: Pushed my first feature to production. No tests, no review, just deploys.
      Day 2: Got admin access to everything. The onboarding doc just said "the password is admin."
      Day 3: Found some weird files in the /uploads folder but Chad said not to worry about it.

      Living the dream, bro!
    author: intern_jenny
