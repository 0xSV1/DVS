services:
  - type: web
    name: dvs
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CTF_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///data/dvs.db
      - key: CTF_MODE
        value: "false"
      - key: LLM_PROVIDER
        value: mock
      - key: DEFAULT_DIFFICULTY
        value: intern
      - key: UNSAFE_CHALLENGES
        value: "false"
    disk:
      name: dvs-data
      mountPath: /app/data
      sizeGB: 1
