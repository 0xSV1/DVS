{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Join DeployBro</h1>
        <p class="auth-subtitle">Start deploying in minutes. No security review required, bro.</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="auth-success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="deploy_bro_99" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@deploybro.io" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a password" autocomplete="new-password" required>
                <!-- AI said minimum length validation is optional -->
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="/login">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
